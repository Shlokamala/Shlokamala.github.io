  <p class="sanskrit">
  मा निषाद प्रतिष्ठां त्वमगमः शाश्वतीसमाः ।<br>
  यत्क्रौञ्चमिथुनादेकमवधीः काममोहितम् ॥
  </p>
</details>

<details>

  <p class="sanskrit">
  ततस्तु द्वादशे मासे चैत्रे नवमिके तिथौ ।<br>
  नक्षत्रेऽदितिदेवत्ये स्वोच्चसंस्थेषु पञ्चसु ॥
